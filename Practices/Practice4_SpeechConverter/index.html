<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Speech Synthesis</title>
  </head>
  <body>
    <div class="container">
      <div class="app-container">
        <div class="headings-container">
          <h1>Speech Synthesis</h1>
          <p>Convert your text to speech</p>
        </div>
        <div class="interaction-container">
          <textarea id="textToConvert" class="text-control" placeholder="Enter text to convert to speech"></textarea>
          <p class="error-para"></p>
          <button id="convertBtn" class="btn">Play Converted Sound</button>
        </div>
      </div>
    </div>

    <script src="./scrpit.js"></script>
  </body>
</html>
