<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>University List</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="header-section">
        <h2>List of University in Cambodia</h2>
        <button id="showBtn">Show</button>
      </div>

      <table id="uniTable">
        <thead>
          <tr>
            <th>No</th>
            <th>University Name</th>
            <th>Website</th>
            <th>Country</th>
            <th>On/Off</th>
            <th>Delete</th>
            <th>Edit</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <p id="statusMsg" class="loading"></p>
    </div>

    <script src="Fetch.js"></script>
  </body>
</html>
