<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Teacher Validation</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
    <form id="form">
        <h1>Create Teacher</h1>
        <div class="input-control">
            <label for="Teachercode">Teacher Code:</label>
            <input type="text" name ="Teachercode" id="Teachercode">
            <div class="error"></div>
        </div>

        <div class="input-control">
            <label for="Teachername">Teacher Name:</label>
            <input type="text" name="Teachername" id="Teachername">
            <div class="error"></div>
        </div>

        <div class="input-control">
            <label for="contact">Contact Number:</label>
            <input type="text" name ="contact" id="contact">
            <div class="error"></div>
        </div>

        <button type="submit" id="BtCreate">Create</button>
        <div id="Msg" class="text-center"></div>
    </form>
</div>

<script src="./script.js"></script>
</body>
</html>
