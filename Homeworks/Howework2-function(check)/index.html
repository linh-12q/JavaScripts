<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Input Validation Practice</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container py-5">
    <h1 class="text-center mb-5">Input Validation</h1>

    <div class="row g-4">

      <div class="col-md-6">
        <div class="card">
          <div class="card-header bg-light text-dark fw-bold">
            1.Any number (integer or decimal)
          </div>
          <div class="card-body">
            <div class="input-group">
              <input type="text" id="txt1" class="form-control" placeholder="e.g. -42, 3.14, 0">
              <button class="btn btn-outline-primary" onclick="validateNumber()">Check</button>
            </div>
            <div id="result1" class="result mt-3"></div>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card">
          <div class="card-header bg-light text-dark fw-bold">
            2. Positive number
          </div>
          <div class="card-body">
            <div class="input-group">
              <input type="text" id="txt2" class="form-control" placeholder="e.g. 5, 7.89">
              <button class="btn btn-outline-success" onclick="validatePositiveNumber()">Check</button>
            </div>
            <div id="result2" class="result mt-3"></div>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card">
          <div class="card-header bg-light text-dark fw-bold">
            3. Decimal number (with dot)
          </div>
          <div class="card-body">
            <div class="input-group">
              <input type="text" id="txt3" class="form-control" placeholder="e.g. 3.14, -0.001">
              <button class="btn btn-outline-info" onclick="validateDecimal()">Check</button>
            </div>
            <div id="result3" class="result mt-3"></div>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card">
          <div class="card-header bg-light text-dark fw-bold">
            4. Positive decimal
          </div>
          <div class="card-body">
            <div class="input-group">
              <input type="text" id="txt4" class="form-control" placeholder="e.g. 2.5, 0.01">
              <button class="btn btn-outline-primary" onclick="validatePositiveDecimal()">Check</button>
            </div>
            <div id="result4" class="result mt-3"></div>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card">
          <div class="card-header bg-light text-dark fw-bold">
            5. Email
          </div>
          <div class="card-body">
            <div class="input-group">
              <input type="text" id="txt5" class="form-control" placeholder="example@domain.com">
              <button class="btn btn-outline-success" onclick="validateEmail()">Check</button>
            </div>
            <div id="result5" class="result mt-3"></div>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card">
          <div class="card-header bg-light text-dark fw-bold">
            6. Boolean (true/false, yes/no, 1/0)
          </div>
          <div class="card-body">
            <div class="input-group">
              <input type="text" id="txt6" class="form-control" placeholder="true, yes, 1, no...">
              <button class="btn btn-outline-info" onclick="validateBoolen()">Check</button>
            </div>
            <div id="result6" class="result mt-3"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="index.js"></script>
</body>
</html>
