<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Async Function With Fetch</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="loading1 (2).css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
      body {
        background-color: #f5f5f5;
      }
      .container {
        background-color: white;
        border-radius: 8px;
        padding: 20px;
        margin-top: 20px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="loader-container" id="loader-container">
      <div class="loader"></div>
    </div>
    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>List of Movies</h3>
        <div>
          <button class="btn btn-primary" id="BtShow">Show</button>
          <button class="btn btn-info" id="BtShowAll">Show All</button>
        </div>
      </div>
      <hr />
      <div class="mb-3 d-flex gap-2">
        <input
          type="text"
          id="searchInput"
          class="form-control"
          placeholder="Search by movie name..."
          style="max-width: 300px"
        />
        <button class="btn btn-success" id="searchBtn">Search</button>
        <button class="btn btn-secondary" id="clearSearchBtn">
          Clear Search
        </button>
      </div>
      <hr />
      <table id="myTable" class="table table-bordered table-hover">
        <thead class="table-dark">
          <tr>
            <th class="text-center">No</th>
            <th class="text-left">Movie name</th>
            <th class="text-center">Types</th>
            <th class="text-center">Image</th>
            <th class="text-center">Air date</th>
            <th class="text-center">Time</th>
            <th class="text-center">Rating</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Existing rows can go here -->
        </tbody>
      </table>
      <div
        id="paginationNav"
        style="margin-top: 30px; text-align: center; display: none"
      >
        <div
          style="
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
          "
        >
          <button
            class="btn btn-outline-primary"
            id="prevBtn"
            onclick="previousPage(event)"
          >
            ← Previous
          </button>
          <span
            id="pageIndicator"
            style="font-weight: bold; font-size: 16px; min-width: 150px"
            >Page 1 of 1</span
          >
          <button
            class="btn btn-outline-primary"
            id="nextBtn"
            onclick="nextPage(event)"
          >
            Next →
          </button>
        </div>
      </div>
    </div>
    <script src="movies.js"></script>
  </body>
</html>
