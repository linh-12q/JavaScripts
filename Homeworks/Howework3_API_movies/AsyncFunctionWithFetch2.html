<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie List</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <style>
      body {
        background-color: #f5f5f5;
      }

      .container {
        background-color: white;
        border-radius: 8px;
        padding: 20px;
        margin-top: 20px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      .loader-container {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.7);
        z-index: 9999;
        justify-content: center;
        align-items: center;
      }

      .loader-container.show {
        display: flex;
      }

      .loader {
        width: 70px;
        height: 70px;
        border: 8px solid #e9ecef;
        border-top: 8px solid #0d6efd;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }

      #myTable img {
        max-width: 120px;
        height: auto;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="loader-container" id="loader-container">
      <div class="loader"></div>
    </div>

    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>List of Movies</h3>
        <div>
          <button class="btn btn-primary" id="BtShow">Show</button>
          <button class="btn btn-info" id="BtShowAll">Show All</button>
        </div>
      </div>

      <hr />

      <div class="mb-3 d-flex gap-2">
        <input
          type="text"
          id="searchInput"
          class="form-control"
          placeholder="Search by movie name..."
          style="max-width: 300px"
        />
        <button class="btn btn-success" id="searchBtn">Search</button>
        <button class="btn btn-secondary" id="clearSearchBtn">Clear Search</button>
      </div>

      <hr />

      <table id="myTable" class="table table-bordered table-hover">
        <thead class="table-dark">
          <tr>
            <th class="text-center">No</th>
            <th>Movie name</th>
            <th class="text-center">Type</th>
            <th class="text-center">Image</th>
            <th class="text-center">Air date</th>
            <th class="text-center">Time</th>
            <th class="text-center">Rating</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>

      <div id="paginationNav" class="mt-4 text-center" style="display: none">
        <div class="d-flex justify-content-center align-items-center gap-3">
          <button class="btn btn-outline-primary" id="prevBtn">← Previous</button>
          <span id="pageIndicator" class="fw-bold">Page 1 of 1</span>
          <button class="btn btn-outline-primary" id="nextBtn">Next →</button>
        </div>
      </div>
    </div>

    <script src="movies.js"></script>
  </body>
</html>
